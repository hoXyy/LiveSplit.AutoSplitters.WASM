name: Release
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        script:
          - folder: p4g
            artifact: p4g_load_remover
          - folder: sr2
            artifact: sr2_autosplitter
          # - folder: gta4
          #   artifact: gta4_autosplitter

    steps:
      - name: Checkout Commit
        uses: actions/checkout@v6

      - name: Install Rust
        uses: hecrj/setup-rust-action@v2
        with:
          rust-version: 'stable'
          targets: 'wasm32-unknown-unknown'

      - name: Build ${{ matrix.script.folder }}
        run: cargo build --target wasm32-unknown-unknown --release --manifest-path=${{
          matrix.script.folder }}/Cargo.toml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.script.artifact }}
          path: ./${{ matrix.script.folder }}/target/wasm32-unknown-unknown/release/${{
            matrix.script.artifact }}.wasm

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: release-${{ github.sha }}
          name: Release ${{ github.sha }}
          files: artifacts/**/*.wasm
