name: Release
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        script:
          - folder: p4g
            artifact: p4g_load_remover
          - folder: sr2
            artifact: sr2_autosplitter
          - folder: gta4
            artifact: gta4_autosplitter
          - folder: p3p
            artifact: p3p_load_remover
          - folder: gta3
            artifact: gta3_autosplitter
          - folder: bully
            artifact: bully_autosplitter

    steps:
      - name: Checkout Commit
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check for changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" != "push" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --quiet ${{ github.event.before }} ${{ github.sha }} -- ${{ matrix.script.folder }}; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust
        if: steps.changes.outputs.changed == 'true'
        uses: hecrj/setup-rust-action@v2
        with:
          rust-version: 'stable'
          targets: 'wasm32-unknown-unknown'

      - name: Build ${{ matrix.script.folder }}
        if: steps.changes.outputs.changed == 'true'
        id: build
        continue-on-error: true
        run: cargo build --target wasm32-unknown-unknown --release --manifest-path=${{
          matrix.script.folder }}/Cargo.toml

      - name: Upload artifact
        if: steps.changes.outputs.changed == 'true' && steps.build.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.script.artifact }}
          path: ./${{ matrix.script.folder }}/target/wasm32-unknown-unknown/release/${{
            matrix.script.artifact }}.wasm

  release:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        script:
          - folder: p4g
            artifact: p4g_load_remover
            tag: p4g
          - folder: sr2
            artifact: sr2_autosplitter
            tag: sr2
          - folder: gta4
            artifact: gta4_autosplitter
            tag: gta4
          - folder: p3p
            artifact: p3p_load_remover
            tag: p3p
          - folder: gta3
            artifact: gta3_autosplitter
            tag: gta3
          - folder: bully
            artifact: bully_autosplitter
            tag: bully

    steps:
      - name: Checkout Commit
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check for changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" != "push" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --quiet ${{ github.event.before }} ${{ github.sha }} -- ${{ matrix.script.folder }}; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifact
        id: download
        if: steps.changes.outputs.changed == 'true'
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.script.artifact }}
          path: artifacts/

      - name: Tag commit
        if: steps.changes.outputs.changed == 'true' && steps.download.outcome == 'success'
        run: |
          git tag ${{ matrix.script.tag }}-${{ github.sha }} || true
          git push origin ${{ matrix.script.tag }}-${{ github.sha }} || true

      - name: Release (latest)
        if: steps.changes.outputs.changed == 'true' && steps.download.outcome == 'success'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ matrix.script.tag }}-latest
          name: ${{ matrix.script.tag }} (latest)
          generate_release_notes: false
          files: artifacts/*.wasm
