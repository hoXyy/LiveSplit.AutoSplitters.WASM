name: Release
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        script:
          - folder: p4g
            artifact: p4g_load_remover
          - folder: sr2
            artifact: sr2_autosplitter
          - folder: gta4
            artifact: gta4_autosplitter

    steps:
      - name: Checkout Commit
        uses: actions/checkout@v6

      - name: Install Rust
        uses: hecrj/setup-rust-action@v2
        with:
          rust-version: 'stable'
          targets: 'wasm32-unknown-unknown'

      - name: Build ${{ matrix.script.folder }}
        id: build
        continue-on-error: true
        run: cargo build --target wasm32-unknown-unknown --release --manifest-path=${{
          matrix.script.folder }}/Cargo.toml

      - name: Upload artifact
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.script.artifact }}
          path: ./${{ matrix.script.folder }}/target/wasm32-unknown-unknown/release/${{
            matrix.script.artifact }}.wasm

  release:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        script:
          - artifact: p4g_load_remover
            tag: p4g
          - artifact: sr2_autosplitter
            tag: sr2
          - artifact: gta4_autosplitter
            tag: gta4

    steps:
      - name: Checkout Commit
        uses: actions/checkout@v6

      - name: Download artifact
        id: download
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.script.artifact }}
          path: artifacts/

      - name: Tag commit
        if: steps.download.outcome == 'success'
        run: |
          git tag ${{ matrix.script.tag }}-${{ github.sha }}
          git push origin ${{ matrix.script.tag }}-${{ github.sha }}

      - name: Release (latest)
        if: steps.download.outcome == 'success'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ matrix.script.tag }}-latest
          name: ${{ matrix.script.tag }} (latest)
          generate_release_notes: true
          files: artifacts/*.wasm