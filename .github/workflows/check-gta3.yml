name: GTA III Autosplitter Checks
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'gta3/**'
      - 'autosplitter-helpers/**'
      - '.cargo/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

jobs:
  clippy:
    name: Check clippy lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: hecrj/setup-rust-action@v2
        with:
          rust-version: 'stable'
          targets: 'wasm32-unknown-unknown'
          components: clippy

      - name: Run Clippy
        run: cargo clippy --package gta3-autosplitter --all-features

  format:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: hecrj/setup-rust-action@v2
        with:
          components: rustfmt

      - name: Run cargo fmt
        run: cargo fmt --all -- --check
